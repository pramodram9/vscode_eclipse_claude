<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Items - CAP Application</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "72", "72full", Arial, Helvetica, sans-serif;
      font-size: 14px;
      background: #f5f6f7;
      color: #32363a;
    }

    /* ── Shell Bar ── */
    .shell-bar {
      background: #0a6ed1;
      color: #fff;
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .shell-bar .app-title { font-size: 16px; font-weight: 600; }

    /* ── Page Layout ── */
    .page { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .page-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }

    /* ── Selection Screen Panel ── */
    .panel {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .panel-header .toggle-icon { font-size: 12px; color: #666; transition: transform .2s; }
    .panel-header.collapsed .toggle-icon { transform: rotate(-90deg); }
    .panel-body { padding: 16px; }
    .panel-body.hidden { display: none; }

    /* ── Filter Grid ── */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .filter-field label {
      display: block;
      font-size: 12px;
      color: #6a6d70;
      margin-bottom: 4px;
    }
    .filter-field input,
    .filter-field select {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid #89919a;
      border-radius: 4px;
      font-size: 14px;
      color: #32363a;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .filter-field input:focus,
    .filter-field select:focus { border-color: #0a6ed1; box-shadow: 0 0 0 2px rgba(10,110,209,.15); }

    /* ── Action Bar ── */
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      background: #fafafa;
      border-radius: 0 0 4px 4px;
    }
    .btn {
      height: 36px;
      padding: 0 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background .15s;
    }
    .btn-primary { background: #0a6ed1; color: #fff; border-color: #0a6ed1; }
    .btn-primary:hover { background: #085caf; }
    .btn-primary:active { background: #0854a0; }
    .btn-secondary { background: #fff; color: #0a6ed1; border-color: #0a6ed1; }
    .btn-secondary:hover { background: #e8f1fb; }

    /* ── Results Panel ── */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-count {
      font-size: 13px;
      color: #6a6d70;
    }

    /* ── Table ── */
    .table-wrapper { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead tr { background: #f2f2f2; }
    th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      color: #32363a;
      border-bottom: 2px solid #d9d9d9;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { background: #e9e9e9; }
    th .sort-icon { margin-left: 4px; font-size: 10px; color: #aaa; }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #eeeeee;
      vertical-align: middle;
    }
    tbody tr:hover { background: #f5f9ff; }

    /* ── Status Badge ── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-NEW         { background: #e8f3ff; color: #0a6ed1; }
    .badge-IN_PROGRESS { background: #fff3e0; color: #e9730c; }
    .badge-DONE        { background: #e8f5e9; color: #256f3a; }

    /* ── Empty / Loading States ── */
    .state-message {
      padding: 48px 0;
      text-align: center;
      color: #6a6d70;
      font-size: 14px;
    }
    .state-message .icon { font-size: 32px; margin-bottom: 8px; }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #d9d9d9;
      border-top-color: #0a6ed1;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error Banner ── */
    .error-banner {
      background: #ffeaea;
      border: 1px solid #e9324a;
      border-radius: 4px;
      padding: 10px 14px;
      color: #bb0000;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="shell-bar">
    <span class="app-title">Items Management</span>
  </div>

  <div class="page">
    <div class="page-title">Items</div>

    <!-- ── Selection Screen ── -->
    <div class="panel" id="selectionPanel">
      <div class="panel-header" onclick="togglePanel()">
        Selection Screen
        <span class="toggle-icon">&#9660;</span>
      </div>
      <div class="panel-body" id="panelBody">
        <div class="filter-grid">

          <div class="filter-field">
            <label for="f_title">Title</label>
            <input type="text" id="f_title" placeholder="Search by title..." />
          </div>

          <div class="filter-field">
            <label for="f_status">Status</label>
            <select id="f_status">
              <option value="">-- All --</option>
              <option value="NEW">New</option>
              <option value="IN_PROGRESS">In Progress</option>
              <option value="DONE">Done</option>
            </select>
          </div>

          <div class="filter-field">
            <label for="f_createdFrom">Created From</label>
            <input type="date" id="f_createdFrom" />
          </div>

          <div class="filter-field">
            <label for="f_createdTo">Created To</label>
            <input type="date" id="f_createdTo" />
          </div>

          <div class="filter-field">
            <label for="f_createdBy">Created By</label>
            <input type="text" id="f_createdBy" placeholder="e.g. alice@example.com" />
          </div>

        </div>
      </div>
      <div class="action-bar">
        <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
        <button class="btn btn-primary" onclick="search()">Go</button>
      </div>
    </div>

    <!-- ── Error Banner ── -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- ── Results ── -->
    <div class="panel">
      <div class="panel-header" style="cursor:default;">
        <div class="results-header" style="width:100%">
          <span>Results</span>
          <span class="result-count" id="resultCount"></span>
        </div>
      </div>
      <div class="panel-body" style="padding:0">
        <div id="tableArea">
          <div class="state-message">
            <div class="icon">&#128269;</div>
            Enter selection criteria and press <strong>Go</strong> to load data.
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  /* ── Panel collapse ── */
  function togglePanel() {
    const header = document.querySelector('.panel-header');
    const body   = document.getElementById('panelBody');
    header.classList.toggle('collapsed');
    body.classList.toggle('hidden');
  }

  /* ── Clear filters ── */
  function clearFilters() {
    ['f_title','f_status','f_createdFrom','f_createdTo','f_createdBy']
      .forEach(id => { document.getElementById(id).value = ''; });
  }

  /* ── Sort state ── */
  let sortCol = 'createdAt', sortDir = 'desc', lastData = [];

  /* ── Build OData $filter string ── */
  function buildFilter() {
    const clauses = [];
    const title      = document.getElementById('f_title').value.trim();
    const status     = document.getElementById('f_status').value;
    const dateFrom   = document.getElementById('f_createdFrom').value;
    const dateTo     = document.getElementById('f_createdTo').value;
    const createdBy  = document.getElementById('f_createdBy').value.trim();

    if (title)     clauses.push(`contains(tolower(title),tolower('${esc(title)}'))`);
    if (status)    clauses.push(`status eq '${esc(status)}'`);
    if (dateFrom)  clauses.push(`createdAt ge ${dateFrom}T00:00:00Z`);
    if (dateTo)    clauses.push(`createdAt le ${dateTo}T23:59:59Z`);
    if (createdBy) clauses.push(`contains(tolower(createdBy),tolower('${esc(createdBy)}'))`);

    return clauses.length ? '$filter=' + encodeURIComponent(clauses.join(' and ')) : '';
  }

  function esc(s) { return s.replace(/'/g, "''"); }

  /* ── Main search ── */
  async function search() {
    showLoading();
    hideError();

    const filter   = buildFilter();
    const orderBy  = `$orderby=${sortCol} ${sortDir}`;
    const query    = [filter, orderBy].filter(Boolean).join('&');
    const url      = `/catalog/Items?${query}`;

    try {
      const res = await fetch(url, { headers: { Accept: 'application/json' } });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      const json = await res.json();
      lastData = json.value || [];
      renderTable(lastData);
    } catch (err) {
      showError(err.message);
      showEmpty('Failed to load data. Please try again.');
    }
  }

  /* ── Render table ── */
  function renderTable(data) {
    document.getElementById('resultCount').textContent =
      data.length ? `${data.length} item(s) found` : '';

    if (!data.length) { showEmpty('No items match the selected criteria.'); return; }

    const cols = [
      { key: 'title',      label: 'Title'       },
      { key: 'description',label: 'Description' },
      { key: 'status',     label: 'Status'      },
      { key: 'createdAt',  label: 'Created At'  },
      { key: 'createdBy',  label: 'Created By'  },
      { key: 'modifiedAt', label: 'Modified At' },
    ];

    const headerCells = cols.map(c => {
      const active = c.key === sortCol;
      const arrow  = active ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
      return `<th onclick="toggleSort('${c.key}')">${c.label}<span class="sort-icon">${arrow}</span></th>`;
    }).join('');

    const rows = data.map(item => `
      <tr>
        <td><strong>${h(item.title)}</strong></td>
        <td>${h(item.description || '—')}</td>
        <td><span class="badge badge-${h(item.status)}">${formatStatus(item.status)}</span></td>
        <td>${formatDate(item.createdAt)}</td>
        <td>${h(item.createdBy || '—')}</td>
        <td>${formatDate(item.modifiedAt)}</td>
      </tr>`).join('');

    document.getElementById('tableArea').innerHTML = `
      <div class="table-wrapper">
        <table>
          <thead><tr>${headerCells}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  /* ── Column sort ── */
  function toggleSort(col) {
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = 'asc'; }
    search();
  }

  /* ── Helpers ── */
  function h(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }
  function formatStatus(s) {
    return { NEW:'New', IN_PROGRESS:'In Progress', DONE:'Done' }[s] || s;
  }

  function showLoading() {
    document.getElementById('resultCount').textContent = '';
    document.getElementById('tableArea').innerHTML =
      '<div class="state-message"><div class="spinner"></div><br>Loading...</div>';
  }
  function showEmpty(msg) {
    document.getElementById('tableArea').innerHTML =
      `<div class="state-message"><div class="icon">&#128203;</div>${msg}</div>`;
  }
  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = 'Error: ' + msg;
    el.style.display = 'block';
  }
  function hideError() {
    document.getElementById('errorBanner').style.display = 'none';
  }

  /* ── Allow Enter key on filter inputs ── */
  document.querySelectorAll('.filter-field input, .filter-field select')
    .forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') search(); }));
</script>
</body>
</html>
